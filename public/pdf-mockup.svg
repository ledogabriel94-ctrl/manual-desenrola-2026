<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Capa do Manual Desenrola 2026">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FAFAF9"/>
    </linearGradient>
    <linearGradient id="verdeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Capa -->
  <g filter="url(#shadow)">
    <rect x="40" y="20" width="520" height="760" rx="18" fill="url(#paper)" stroke="#1F2937" stroke-width="2"/>

    <!-- Faixa verde topo -->
    <rect x="40" y="20" width="520" height="100" rx="18" fill="url(#verdeGrad)"/>
    <rect x="40" y="100" width="520" height="22" fill="url(#verdeGrad)"/>

    <text x="300" y="78" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="800" font-size="34" fill="#FFFFFF" letter-spacing="2">MANUAL</text>

    <!-- Título principal -->
    <text x="300" y="280" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="800" font-size="72" fill="#1F2937" letter-spacing="-1">DESENROLA</text>
    <text x="300" y="360" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="800" font-size="100" fill="#16A34A" letter-spacing="-2">2026</text>

    <!-- Subtítulo -->
    <text x="300" y="440" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="#4B5563">Limpe seu nome com até</text>
    <text x="300" y="478" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="800" font-size="42" fill="#15803D">90% de desconto</text>

    <!-- Bullets -->
    <g font-family="Inter, system-ui, sans-serif" font-size="18" fill="#1F2937" font-weight="500">
      <text x="120" y="560">✓ 6 bancos cobertos</text>
      <text x="120" y="596">✓ 3 rotas pra limpar o nome</text>
      <text x="120" y="632">✓ Mensagens prontas para copiar</text>
      <text x="120" y="668">✓ Tabela oficial de descontos</text>
    </g>

    <!-- Selo inferior -->
    <g transform="translate(300, 740)">
      <rect x="-160" y="-25" width="320" height="50" rx="25" fill="#1F2937"/>
      <text x="0" y="6" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-weight="700" font-size="16" fill="#FEF3C7" letter-spacing="1">BASEADO EM PORTARIA 1.243</text>
    </g>
  </g>
</svg>
